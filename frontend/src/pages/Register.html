<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CampusTrade Registration Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#13ec13",
              "background-light": "#f6f8f6",
              "background-dark": "#102210",
            },
            fontFamily: {
              "display": ["Lexend"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden max-w-[430px] mx-auto shadow-2xl">
<!-- Top App Bar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center cursor-pointer rounded-full hover:bg-primary/10">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">Create Account</h2>
</div>
<!-- Header Section -->
<div class="px-4 pt-8 pb-4">
<div class="w-16 h-16 bg-primary/20 rounded-2xl flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary text-4xl">storefront</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[32px] font-bold leading-tight">Join CampusTrade</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal mt-2">The exclusive marketplace for your university community.</p>
</div>
<!-- Form Section -->
<div class="flex flex-col gap-5 px-4 py-4">
<!-- Full Name -->
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal ml-1">Full Name</span>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 h-14 pl-12 pr-4 placeholder:text-slate-400 text-base font-normal leading-normal" placeholder="Alex Johnson" type="text"/>
</div>
</label>
<!-- University Email -->
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal ml-1">University Email</span>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">school</span>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 h-14 pl-12 pr-4 placeholder:text-slate-400 text-base font-normal leading-normal" placeholder="alex.j@university.edu" type="email"/>
</div>
</label>
<!-- Password -->
<label class="flex flex-col gap-2">
<span class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal ml-1">Password</span>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 h-14 pl-12 pr-12 placeholder:text-slate-400 text-base font-normal leading-normal" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl cursor-pointer">visibility</span>
</div>
</label>
</div>
<!-- Action Section -->
<div class="px-4 py-8 flex flex-col gap-4">
<button class="w-full h-14 bg-primary text-slate-900 font-bold text-lg rounded-xl shadow-lg shadow-primary/20 hover:brightness-105 active:scale-[0.98] transition-all">
                Create Account
            </button>
<p class="text-slate-500 dark:text-slate-400 text-sm text-center px-6 leading-relaxed">
                By signing up, you agree to our 
                <span class="text-primary font-medium">Terms of Service</span> and 
                <span class="text-primary font-medium">Privacy Policy</span>.
            </p>
</div>
<!-- Footer / Switch to Login -->
<div class="mt-auto pb-10 px-4 text-center">
<p class="text-slate-600 dark:text-slate-400 text-base">
                Already have an account? 
                <a class="text-primary font-bold ml-1 hover:underline" href="#">Login</a>
</p>
</div>
<!-- iPhone Notch Indicator (Visual only) -->
<div class="mx-auto h-1.5 w-32 bg-slate-300 dark:bg-slate-700 rounded-full mb-2"></div>
</div>
</body></html>
